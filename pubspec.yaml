name: florys_diaries
description: A local-first travel diary, document vault, map and backup app.
publish_to: 'none'
version: 1.0.0+7
environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_picker: ^10.3.3
  path_provider: ^2.1.5
  open_filex: ^4.7.0
  pdfx: ^2.9.2
  share_plus: ^12.0.2
  archive: ^3.6.1
  flutter_map: ^8.2.1
  latlong2: ^0.9.1
  google_sign_in: ^7.2.0
  http: ^1.6.0
  flutter_local_notifications: ^20.1.0
  flutter_timezone: ^5.1.0
  timezone: ^0.10.1
  pdf: 3.12.0
  local_auth: 3.0.1
  crypto: 3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
